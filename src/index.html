<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self';">
    <title>CesiumClient</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div class="logo">CesiumClient</div>

    <button class="discord-btn" id="discord-btn" title="Discord сервер">
        <svg viewBox="0 0 127.14 96.36" width="20" height="20">
            <path fill="currentColor" d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
        </svg>
    </button>

    <button class="settings-btn" id="settings-btn" title="Настройки">&#9881;</button>

    <div class="settings-overlay" id="settings-overlay">
        <div class="settings-modal">
            <div class="settings-header">
                <span>Настройки</span>
                <button class="settings-close" id="settings-close">&times;</button>
            </div>
            <div class="settings-body">
                <div class="settings-toggle-row">
                    <span>Проверять файлы при обновлении</span>
                    <label class="toggle">
                        <input type="checkbox" id="skip-check-toggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="settings-divider"></div>
                <button class="settings-option" id="check-updates-btn">Проверить обновления</button>
                <button class="settings-option" id="verify-integrity-btn" style="display:none;">Проверить целостность</button>
                <button class="settings-option settings-option-danger" id="delete-game-btn">Удалить игру</button>
            </div>
        </div>
    </div>

    <div class="directory-container">
        <div class="dir-label">ПУТЬ УСТАНОВКИ</div>
        <div class="dir-path-wrapper">
            <div class="dir-path" id="install-path">C:\Games\CesiumGD</div>
            <button class="change-dir-btn" id="change-dir-btn">ИЗМЕНИТЬ</button>
        </div>
    </div>

    <div class="progress-container" id="progress-container">
        <div class="progress-text" id="progress-text"></div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progress-bar-fill"></div>
        </div>
    </div>

    <div class="button-group">
        <button class="action-btn action-btn-secondary" id="update-btn" style="display:none;">ОБНОВИТЬ</button>
        <button class="action-btn" id="main-btn">СКАЧАТЬ</button>
    </div>

    <div class="version-text">v1.0.1</div>

    <script src="./js/app.js"></script>
</body>
</html>
